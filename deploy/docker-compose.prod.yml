services:
  app:
    build:
      context: ../backend
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      PORT: 5000
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    expose:
      - "5000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    restart: unless-stopped

volumes:
  uploads_data:
