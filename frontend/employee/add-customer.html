  async function uploadDocument() {
    if (!newCustomerId) return showAlert('page-alert', 'Add a customer first.', 'error');
    const files = Array.from(document.getElementById('doc-file').files || []);
    const docType = document.getElementById('doc-type').value;
    const documentPassword = document.getElementById('doc-password').value.trim();
    if (!files.length) return showAlert('page-alert', 'Select at least one file.', 'error');
    const form = new FormData();
    files.forEach((file) => form.append('documents', file));
    form.append('doc_type', docType);
    if (documentPassword) form.append('document_password', documentPassword);
    const btn = document.getElementById('upload-btn');
    btn.disabled = true; btn.textContent = 'Uploading...';
    const res = await api.upload(`/employee/documents/${newCustomerId}`, form);
    btn.disabled = false; btn.textContent = '⬆️ Upload Document';
    if (!res?.ok) return showAlert('page-alert', res?.data?.message || 'Upload failed.', 'error');
    showAlert('page-alert', `${files.length} document${files.length > 1 ? 's' : ''} uploaded!`, 'success');
    document.getElementById('doc-file').value = '';
    document.getElementById('doc-password').value = '';
    const uploadedDocuments = Array.isArray(res.data.documents) ? res.data.documents : [];
    const safePassword = documentPassword || res.data.document?.document_password || '';
    const escapeHtml = (value) => String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
    function resolveFileUrl(path) {
      if (!path) return '#';
      if (path.startsWith('http://') || path.startsWith('https://')) return path;
      const uploadsBase = (typeof api !== 'undefined' && api.uploadsBase) ? api.uploadsBase : (window.api && window.api.uploadsBase) ? window.api.uploadsBase : null;
      return uploadsBase ? uploadsBase + path : path;
    }

    const docsToRender = uploadedDocuments.length ? uploadedDocuments : files.map((file) => ({ file_name: file.name, file_path: '' }));
    document.getElementById('uploaded-docs').innerHTML += docsToRender.map((doc, index) => {
      const uploadedAt = doc?.uploaded_at || doc?.updated_at || null;
      const uploadedStamp = uploadedAt ? ` <span style="color:var(--text-muted);font-size:12px;">(${formatDate(uploadedAt)} ${formatTime(uploadedAt)})</span>` : '';
      return `
      <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-card);border-radius:8px;margin-bottom:6px;font-size:13px;">
        <span>Uploaded</span><span>${escapeHtml(docType)} — ${escapeHtml(doc?.file_name || files[index].name)}</span>
        <span style="color:var(--text-muted);">Password: ${escapeHtml(safePassword || 'Not set')}</span>
        <span style="margin-left:8px;">${uploadedStamp}</span>
        ${doc?.file_path ? `<a href="${resolveFileUrl(doc.file_path)}" target="_blank" class="btn btn-secondary btn-sm" style="margin-left:auto;">View</a>` : ''}
      </div>`;
    }).join('');
  }
