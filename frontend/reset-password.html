<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLN Lending Suite — Reset Password</title>
  <meta name="description" content="Request a password reset link or set a new password for your CLN account." />
  <meta name="theme-color" content="#0f2747" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <script>
    (function () {
      try {
        var storedTheme = localStorage.getItem('cln_theme');
        var theme = storedTheme === 'light' || storedTheme === 'dark'
          ? storedTheme
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (err) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-container">
      <div class="login-card">
        <div class="user-avatar-large">R</div>

        <div id="request-state">
          <h2 style="margin: 0 0 8px; text-align:center;"><span class="emoji-sm">📧</span>Reset password by email</h2>
          <p style="margin: 0 0 20px; text-align:center; color: var(--text-secondary); font-size: 14px;">
            Enter the admin email address and we’ll send a reset link.
          </p>

          <div id="request-alert" class="alert alert-error"></div>

          <form id="request-form">
            <div class="form-group">
              <input type="email" id="request-email" class="form-control" placeholder="Admin email" autocomplete="username" required />
            </div>

            <button type="submit" id="request-btn" class="btn btn-primary" style="width:100%;">
              <span id="request-btn-text"><span class="emoji-sm">📧</span>Send reset link</span>
              <span id="request-btn-spinner" class="spinner" style="display:none;"></span>
            </button>
          </form>
        </div>

        <div id="reset-state" style="display:none;">
          <h2 style="margin: 0 0 8px; text-align:center;"><span class="emoji-sm">🔐</span>Set a new password</h2>
          <p style="margin: 0 0 20px; text-align:center; color: var(--text-secondary); font-size: 14px;">
            Use the link from your email to finish the reset.
          </p>

          <div id="reset-alert" class="alert alert-error"></div>

          <form id="reset-form">
            <div class="form-group">
              <input type="password" id="new-password" class="form-control" placeholder="New password" autocomplete="new-password" required />
            </div>

            <div class="form-group">
              <input type="password" id="confirm-password" class="form-control" placeholder="Confirm new password" autocomplete="new-password" required />
            </div>

            <button type="submit" id="reset-btn" class="btn btn-primary" style="width:100%;">
              <span id="reset-btn-text"><span class="emoji-sm">🔐</span>Update password</span>
              <span id="reset-btn-spinner" class="spinner" style="display:none;"></span>
            </button>
          </form>
        </div>

        <div id="success-state" style="display:none;">
          <div class="alert alert-success show" id="success-message"></div>
          <a href="/index.html" class="btn btn-primary" style="width:100%; margin-top: 8px; text-decoration:none;"><span class="emoji-sm">🔙</span>Back to login</a>
        </div>

        <div style="margin-top: 18px; text-align:center;">
          <a href="/index.html" class="forgot-password" style="display:inline-block;">Back to login</a>
        </div>
      </div>
    </div>

    <footer class="login-page-footer">
      <p>CLN Lending Suite © 2026</p>
      <span class="footer-link"><a href="#">cln.lending</a></span>
    </footer>
  </div>

  <script src="/js/runtime-config.js?v=20260523a"></script>
  <script src="/js/api.js?v=20260520a"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const resetToken = params.get('token');

    const requestState = document.getElementById('request-state');
    const resetState = document.getElementById('reset-state');
    const successState = document.getElementById('success-state');

    const requestForm = document.getElementById('request-form');
    const resetForm = document.getElementById('reset-form');

    const requestAlert = document.getElementById('request-alert');
    const resetAlert = document.getElementById('reset-alert');
    const successMessage = document.getElementById('success-message');

    function showState(state) {
      requestState.style.display = state === 'request' ? 'block' : 'none';
      resetState.style.display = state === 'reset' ? 'block' : 'none';
      successState.style.display = state === 'success' ? 'block' : 'none';
    }

    function setLoading(prefix, loading) {
      document.getElementById(`${prefix}-btn`).disabled = loading;
      document.getElementById(`${prefix}-btn-text`).style.display = loading ? 'none' : 'inline';
      document.getElementById(`${prefix}-btn-spinner`).style.display = loading ? 'inline-block' : 'none';
    }

    if (resetToken) {
      showState('reset');
    } else {
      showState('request');
    }

    requestForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      requestAlert.className = 'alert alert-error';
      requestAlert.textContent = '';

      const email = document.getElementById('request-email').value.trim();
      setLoading('request', true);

      const res = await api.post('/auth/forgot-password', { email });

      setLoading('request', false);

      if (!res || !res.ok) {
        requestAlert.className = 'alert alert-error show';
        requestAlert.textContent = res?.data?.message || 'Unable to send reset link.';
        return;
      }

      successMessage.textContent = res.data.message || 'Check your email for the reset link.';
      showState('success');
    });

    resetForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      resetAlert.className = 'alert alert-error';
      resetAlert.textContent = '';

      const password = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      setLoading('reset', true);

      const res = await api.post('/auth/reset-password', {
        token: resetToken,
        password,
        confirmPassword
      });

      setLoading('reset', false);

      if (!res || !res.ok) {
        resetAlert.className = 'alert alert-error show';
        resetAlert.textContent = res?.data?.message || 'Unable to reset password.';
        return;
      }

      successMessage.textContent = res.data.message || 'Password updated successfully.';
      showState('success');
      window.history.replaceState({}, document.title, '/reset-password.html');
    });
  </script>
</body>
</html>
