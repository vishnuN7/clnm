<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLN Lending Suite — Login</title>
  <meta name="description" content="Secure login portal for the CLN Lending Suite." />
  <meta name="theme-color" content="#0f2747" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="login-page">
  <div class="login-wrapper">

    <div class="login-container">
      <div class="login-card">
        <div class="login-brand">
          <div class="brand-logo-container">
            <svg class="brand-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="var(--accent-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 17L12 22L22 17" stroke="var(--accent-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 12L12 17L22 12" stroke="var(--accent-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 22V12" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
            </svg>
          </div>
          <h2 class="brand-title">Dixit Lending Solution</h2>
          <p class="brand-subtitle">CLN Lending Suite</p>
        </div>

        <div class="login-role-toggle" role="group" aria-label="Select login role">
          <button type="button" id="btn-admin" class="active" onclick="selectRole('admin')">Admin</button>
          <button type="button" id="btn-employee" onclick="selectRole('employee')">Employee</button>
        </div>


        
        <div id="login-alert" class="alert alert-error"></div>

        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <input type="email" id="email" class="form-control" placeholder="Email or username" required autocomplete="username" />
          </div>
          
          <div class="form-group password-group">
            <div class="password-input-wrapper">
              <input type="password" id="password" class="form-control" placeholder="Password" required autocomplete="current-password" />
              <button type="button" class="toggle-password" onclick="togglePasswordVisibility()" aria-label="Show password">
                <span class="eye-icon" aria-hidden="true"></span>
              </button>
            </div>
            <a href="/reset-password.html" class="forgot-password" id="forgot-password-link">Forgot password?</a>
          </div>

          <div class="form-group checkbox-group">
            <input type="checkbox" id="keep-signed" class="form-checkbox" />
            <label for="keep-signed" class="checkbox-label">Keep me signed in</label>
          </div>

          <button type="submit" id="login-btn" class="btn btn-primary">
            <span id="btn-text"><span class="emoji-sm">🔐</span>Sign in</span>
            <span id="btn-spinner" class="spinner" style="display:none;"></span>
          </button>
        </form>

      </div>
    </div>

    <footer class="login-page-footer">
      <p>dixitlendingsolution © 2026</p>
      <span class="footer-link"><a href="#">avitecin</a></span>
    </footer>
  </div>

  <script src="/js/runtime-config.js?v=20260615b"></script>
  <script src="/js/api.js?v=20260615b"></script>
  <script>
    let selectedRole = 'admin';

    // Redirect if already logged in
    const existingUser = getUser();
    if (existingUser && getToken()) {
      window.location.href = existingUser.role === 'admin' ? '/admin/dashboard.html?fresh=20260516d' : '/employee/dashboard.html';
    }

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('btn-admin').classList.toggle('active', role === 'admin');
      document.getElementById('btn-employee').classList.toggle('active', role === 'employee');
    }

    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const toggleBtn = document.querySelector('.toggle-password');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleBtn.classList.add('visible');
      } else {
        passwordInput.type = 'password';
        toggleBtn.classList.remove('visible');
      }

      if (typeof window.clnIcon === 'function') {
        const visible = toggleBtn.classList.contains('visible');
        toggleBtn.setAttribute('aria-label', visible ? 'Hide password' : 'Show password');
        toggleBtn.innerHTML = window.clnIcon(visible ? 'eyeOff' : 'eye');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const alertEl  = document.getElementById('login-alert');
      alertEl.classList.remove('show');

      document.getElementById('btn-text').style.display = 'none';
      document.getElementById('btn-spinner').style.display = 'inline-block';
      document.getElementById('login-btn').disabled = true;

      const res = await api.post('/auth/login', { email, password, role: selectedRole });

      document.getElementById('btn-text').style.display = 'inline';
      document.getElementById('btn-spinner').style.display = 'none';
      document.getElementById('login-btn').disabled = false;

      if (!res || !res.ok) {
        const msg = res?.data?.message || 'Login failed.';
        alertEl.className = 'alert alert-error show';
        alertEl.textContent = msg;
        return;
      }

      setSession(res.data.token, res.data.user);
      window.location.href = res.data.user.role === 'admin' ? '/admin/dashboard.html?fresh=20260516d' : '/employee/dashboard.html';
    }
  </script>
</body>
</html>
