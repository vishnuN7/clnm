<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLN Lending Suite — Login</title>
  <meta name="description" content="Secure login portal for the CLN Lending Suite." />
  <meta name="theme-color" content="#0f2747" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="login-page">
  <div class="login-wrapper">

    <div class="login-container">
      <div class="login-card">
        <div class="login-brand">
          <div class="brand-logo-container">
            <img class="brand-logo" src="/icons/logo.png" alt="DIXIT Lending Solution Logo" />
          </div>
          <h2 class="brand-title">Dixit Lending Solution</h2>
        </div>

        <div class="login-role-toggle" role="group" aria-label="Select login role">
          <button type="button" id="btn-admin" class="active" onclick="selectRole('admin')">Admin</button>
          <button type="button" id="btn-employee" onclick="selectRole('employee')">Employee</button>
        </div>


        
        <div id="login-alert" class="alert alert-error"></div>

        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <input type="email" id="email" class="form-control" placeholder="Email or username" required autocomplete="username" />
          </div>
          
          <div class="form-group password-group">
            <div class="password-input-wrapper">
              <input type="password" id="password" class="form-control" placeholder="Password" required autocomplete="current-password" />
              <button type="button" class="toggle-password" onclick="togglePasswordVisibility()" aria-label="Show password">
                <span class="eye-icon" aria-hidden="true"></span>
              </button>
            </div>
            <a href="/reset-password.html" class="forgot-password" id="forgot-password-link">Forgot password?</a>
          </div>

          <div class="form-group checkbox-group">
            <input type="checkbox" id="keep-signed" class="form-checkbox" />
            <label for="keep-signed" class="checkbox-label">Keep me signed in</label>
          </div>

          <button type="submit" id="login-btn" class="btn btn-primary">
            <span id="btn-text"><span class="emoji-sm">🔐</span>Sign in</span>
            <span id="btn-spinner" class="spinner" style="display:none;"></span>
          </button>
        </form>

      </div>
    </div>

    <footer class="login-page-footer">
      <p>© 2026 Dixit Lending Solution. All Rights Reserved.</p>
      <span class="footer-link"><a href="#">~Support & Assistance: avitecin@gmail.com</a></span>
    </footer>
  </div>

  <script src="/js/runtime-config.js?v=20260615c"></script>
  <script src="/js/api.js?v=20260615b"></script>
  <script>
    let selectedRole = 'admin';

    // Show cached login error if any (like auto-deactivation)
    const cachedError = localStorage.getItem('login_error');
    if (cachedError) {
      const alertEl = document.getElementById('login-alert');
      if (alertEl) {
        alertEl.className = 'alert alert-error show';
        alertEl.textContent = cachedError;
      }
      localStorage.removeItem('login_error');
    }

    // Redirect if already logged in
    const existingUser = getUser();
    if (existingUser && getToken()) {
      window.location.href = existingUser.role === 'admin' ? '/admin/dashboard.html?fresh=20260516d' : '/employee/dashboard.html';
    }

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('btn-admin').classList.toggle('active', role === 'admin');
      document.getElementById('btn-employee').classList.toggle('active', role === 'employee');
    }

    // SVG path data for the two eye states
    const EYE_PATHS = {
      eye: '<path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="2.5"/>',
      eyeOff: '<path d="M3 3l18 18"/><path d="M10.5 10.5a2.5 2.5 0 1 0 3 3"/><path d="M6.2 6.2C3.9 7.9 2 12 2 12s3.5 6 10 6c1.3 0 2.5-.2 3.6-.6"/><path d="M14.6 4.6C13.8 4.2 12.9 4 12 4c-6.5 0-10 8-10 8a20.1 20.1 0 0 0 4.8 5.7"/>'
    };

    function getOrCreateEyeSvg(btn) {
      let svg = btn.querySelector('svg');
      if (!svg) {
        // First call — build the SVG once and append it; never replace it again
        svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 24 24');
        svg.setAttribute('width', '18');
        svg.setAttribute('height', '18');
        svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke', 'currentColor');
        svg.setAttribute('stroke-width', '1.8');
        svg.setAttribute('stroke-linecap', 'round');
        svg.setAttribute('stroke-linejoin', 'round');
        svg.setAttribute('aria-hidden', 'true');
        // Remove any existing child span so the SVG is the only child
        btn.innerHTML = '';
        btn.appendChild(svg);
      }
      return svg;
    }

    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const toggleBtn = document.querySelector('.toggle-password');
      const isVisible = passwordInput.type === 'password';

      passwordInput.type = isVisible ? 'text' : 'password';
      toggleBtn.classList.toggle('visible', isVisible);
      toggleBtn.setAttribute('aria-label', isVisible ? 'Hide password' : 'Show password');

      // Mutate the SVG paths in-place — no innerHTML replacement, no MutationObserver trigger
      const svg = getOrCreateEyeSvg(toggleBtn);
      svg.innerHTML = isVisible ? EYE_PATHS.eyeOff : EYE_PATHS.eye;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const alertEl  = document.getElementById('login-alert');
      alertEl.classList.remove('show');

      document.getElementById('btn-text').style.display = 'none';
      document.getElementById('btn-spinner').style.display = 'inline-block';
      document.getElementById('login-btn').disabled = true;

      const res = await api.post('/auth/login', { email, password, role: selectedRole });

      document.getElementById('btn-text').style.display = 'inline';
      document.getElementById('btn-spinner').style.display = 'none';
      document.getElementById('login-btn').disabled = false;

      if (!res || !res.ok) {
        const msg = res?.data?.message || 'Login failed.';
        alertEl.className = 'alert alert-error show';
        alertEl.textContent = msg;
        return;
      }

      setSession(res.data.token, res.data.user);
      window.location.href = res.data.user.role === 'admin' ? '/admin/dashboard.html?fresh=20260516d' : '/employee/dashboard.html';
    }
  </script>
</body>
</html>
